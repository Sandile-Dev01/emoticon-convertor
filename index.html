<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css"/>
    <title>Emoticon Convertor</title>
    <link rel="icon" type="image" href="favicon.png">
  </head>
  <body>
    <h1 class="emoticon-header">Emoticon Convertor</h1>

    <section>
      <div class="container">
        <div class="sub-container">
          <label>Emoticon to convert</label>

          <input type="text" id="text-field">

          <button class="convert-btn" onclick="loadInput()">Convert</button>

          <div class="emoji-displayer" id="emoji-displayer">
            <p id="emoji-display">Emoji <span class="arrow">&gt;</span></p>
            <div class="emoji-space" id="emoji-space"></div>
          </div>

          <div class="meaning-box" id="meaning-box">
            <p>
              <strong>Meaning:</strong> Lorem ipsum dolor sit amet, consectetur
              adipisicing elit. Nisi vel obcaecati omnis totam ut, tenetur neque
              eligendi nobis libero fuga eius aperiam sunt dolorum.
            </p>
          </div>
          <button class="erase-btn" onclick="eraseDisplay()" id="eraser">
            New Emoticon
          </button>
        </div>
      </div>
    </section>
    <footer>
      <p class="credit">Copyright @2022 by <span>Sandile Ndimande</span></p>
    </footer>
    <script src="main.js"></script>
  </body>
</html>
